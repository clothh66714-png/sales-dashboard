<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務資源分配儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--surface:#fff;--s2:#eeece7;--s3:#e0ddd6;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.14);
  --text:#1c1a14;--t2:#6b6558;--t3:#a09888;
  --blue:#185FA5;--blue-l:#e8effe;--blue-t:#1a5fcc;
  --green:#1a7a4a;--green-l:#d6f5e4;
  --amber:#c47d0e;--amber-l:#fef0d0;
  --red:#c03030;--red-l:#fde8e8;
  --info-bg:#e8effe;--info-text:#185FA5;
  --success-bg:#d6f5e4;--success-text:#1a7a4a;
  --warning-bg:#fef0d0;--warning-text:#c47d0e;
  --danger-bg:#fde8e8;--danger-text:#c03030;
  --r:12px;--rs:8px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── Header ── */
header{background:var(--text);color:#fff;padding:0 32px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:var(--blue-t);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hdr-right{display:flex;align-items:center;gap:14px;}
.htime{font-size:11px;font-family:'DM Mono',monospace;color:rgba(255,255,255,.45);}
.si{font-size:11px;font-family:'DM Mono',monospace;color:#4aff9f;opacity:0;transition:opacity .5s;}
.si.show{opacity:1;}

/* ── Page ── */
.page{max-width:1280px;margin:0 auto;padding:28px 24px;}
.ptitle{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px;}
.psub{font-size:13px;color:var(--t3);margin-bottom:20px;}

/* ── Info bar ── */
.info-bar{background:var(--info-bg);border:0.5px solid rgba(24,95,165,.2);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;font-size:12px;color:var(--info-text);line-height:1.9;}

/* ── Controls ── */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center;}
.cg{display:flex;gap:2px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rs);padding:3px;align-items:center;}
.cg>label{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;padding:0 9px 0 6px;border-right:0.5px solid var(--border2);margin-right:3px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
button.ctrl{font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500;}
button.ctrl:hover{background:var(--s2);}
button.ctrl.on{background:var(--text);color:#fff;font-weight:700;}
button.ctrl.on.b{background:var(--blue-t);}

/* ── Edit panel ── */
.ep{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:18px 22px;margin-bottom:20px;display:none;}
.ep.open{display:block;}
.ep-title{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:14px;}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.ep-card{background:var(--bg);border-radius:var(--rs);padding:14px;}
.ep-name{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ep-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ep-fields{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.ep-f{display:flex;flex-direction:column;gap:3px;}
.ep-f.full{grid-column:1/-1;}
.ep-lbl{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
.ep-inp{font-size:13px;font-family:'DM Mono',monospace;font-weight:500;padding:5px 7px;border-radius:var(--rs);border:0.5px solid var(--border2);background:var(--surface);color:var(--text);width:100%;transition:border-color .15s,background .15s;}
.ep-inp:focus{outline:none;border-color:var(--blue-t);background:var(--info-bg);}
.ep-add{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border2);align-items:flex-end;}

/* ── Region ── */
.rb{margin-bottom:28px;}
.rh{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.rt{font-size:16px;font-weight:700;}
.rc{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;}
.rl{flex:1;height:0.5px;background:var(--border2);}

/* ── Cards ── */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.06);}
.card.priority{border:2px solid var(--amber);}
.cbar{position:absolute;top:0;left:0;right:0;height:3px;}
.pb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:var(--warning-bg);color:var(--warning-text);padding:2px 7px;border-radius:5px;margin-bottom:8px;}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.cname{font-size:14px;font-weight:700;}
.score{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border:0.5px solid var(--border2);border-radius:var(--rs);overflow:hidden;margin-bottom:10px;}
.st{text-align:center;padding:7px 3px;}
.st+.st{border-left:0.5px solid var(--border2);}
.sv{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;margin-bottom:2px;}
.sl{font-size:9px;font-weight:500;color:var(--t3);line-height:1.3;}

/* ── Tags ── */
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;}
.tag.ph{background:var(--info-bg);color:var(--info-text);}
.tag.tm{background:var(--warning-bg);color:var(--warning-text);}
.tag.in{background:var(--success-bg);color:var(--success-text);}
.tag.pl{background:var(--s2);color:var(--t2);}

/* ── Overdue ── */
.od-title{font-size:10px;font-weight:700;color:var(--red);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.od-item{display:flex;align-items:center;gap:6px;font-size:10px;padding:3px 0;border-bottom:0.5px solid var(--border);}
.od-item:last-child{border-bottom:none;}
.od-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2);font-family:'DM Mono',monospace;}
.od-days{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--danger-bg);color:var(--danger-text);flex-shrink:0;}
.od-sec{font-size:9px;color:var(--t3);flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

footer{text-align:center;padding:28px;font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;}

@media(max-width:600px){
  .page{padding:16px;}
  header{padding:0 16px;}
  .ep-fields{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📊</div>
    業務資源分配儀表板
  </div>
  <div class="hdr-right">
    <span class="si" id="si">✓ 已儲存</span>
    <div class="htime" id="htime">—</div>
  </div>
</header>

<div class="page">
  <div class="ptitle">業務資源分配</div>
  <div class="psub" id="psub">各區業務追蹤狀況總覽</div>

  <div class="info-bar">
    <strong>分配規則：</strong>各區獨立排序，本月已分配數最少者優先拿到新客戶；同分時比分配分數。<br>
    <strong>分配分數</strong> = 追蹤中件數 + 逾期未更新件數 × 2　｜　<strong>逾期定義：</strong>最後留言超過 14 天
  </div>

  <div class="controls">
    <div class="cg">
      <label>面板</label>
      <button class="ctrl b" id="btn-edit" onclick="toggleEdit()">✏️ 編輯資料</button>
    </div>
  </div>

  <div class="ep" id="ep">
    <div class="ep-title">編輯各業務資料（自動儲存）</div>
    <div class="ep-grid" id="ep-grid"></div>
    <div class="ep-add">
      <div class="ep-f"><div class="ep-lbl">新增業務姓名</div><input class="ep-inp" id="new-name" placeholder="例：Mike" style="max-width:140px;"></div>
      <div class="ep-f"><div class="ep-lbl">區域</div>
        <select id="new-region" class="ep-inp" style="max-width:100px;">
          <option value="北部">北部</option>
          <option value="桃園">桃園</option>
        </select>
      </div>
      <button onclick="addPerson()" style="font-size:12px;font-weight:700;padding:7px 16px;border-radius:var(--rs);border:none;background:var(--blue-t);color:#fff;cursor:pointer;">＋ 新增</button>
      <button onclick="removePerson()" style="font-size:12px;font-weight:500;padding:7px 14px;border-radius:var(--rs);border:0.5px solid var(--border2);background:transparent;color:var(--red);cursor:pointer;">— 刪除</button>
    </div>
  </div>

  <div id="boards"></div>
</div>

<footer>業務資源分配儀表板 &nbsp;·&nbsp; 資料儲存於本機瀏覽器</footer>

<script>
const COLORS = ['#185FA5','#1a7a4a','#c47d0e','#c03030','#6d3fcd','#0f7490','#94b4f0','#3db87a'];

const DEF = [
  {name:'jack/Sales',   region:'北部', thisMonth:5,  tracking:36, overdue:22, possibleHigh:20, timeNeeded:11, introNeeded:4,  possibleLow:1,
   overdueList:[{id:'25123691',loc:'台北市大...',days:55,section:'介紹完考慮中-可能性高'},{id:'26034995',loc:'台北市...',days:53,section:'介紹完考慮中-可能性高'},{id:'26014283',loc:'台北市萬...',days:53,section:'機會高-需要時間等待'},{id:'26034959',loc:'台北市...',days:51,section:'介紹完考慮中-可能性高'}]},
  {name:'Harry / Sales',region:'北部', thisMonth:6,  tracking:32, overdue:11, possibleHigh:10, timeNeeded:10, introNeeded:9,  possibleLow:3,
   overdueList:[{id:'26035011',loc:'台北市內...',days:49,section:'介紹完考慮中-可能性高'},{id:'26014193',loc:'台北市中山...',days:48,section:'機會高-需要時間等待'},{id:'26045365',loc:'新北市...',days:31,section:'介紹完考慮中-可能性高'}]},
  {name:'Wei/Sales',    region:'北部', thisMonth:7,  tracking:42, overdue:28, possibleHigh:20, timeNeeded:11, introNeeded:8,  possibleLow:3,
   overdueList:[{id:'26024540',loc:'台北市(Go...',days:47,section:'機會高-需要時間等待'},{id:'26014340',loc:'台北市萬華...',days:44,section:'待介紹'},{id:'25020201',loc:'台北市大...',days:33,section:'介紹完考慮中-可能性高'}]},
  {name:'Johnny / Sales',region:'桃園',thisMonth:4, tracking:28, overdue:9,  possibleHigh:8,  timeNeeded:7,  introNeeded:5,  possibleLow:2,
   overdueList:[{id:'26031001',loc:'桃園市中壢...',days:35,section:'介紹完考慮中-可能性高'},{id:'26031002',loc:'桃園市...',days:28,section:'機會高-需要時間等待'}]},
  {name:'Jason/Sales',  region:'桃園',thisMonth:6,  tracking:31, overdue:12, possibleHigh:9,  timeNeeded:8,  introNeeded:4,  possibleLow:3,
   overdueList:[{id:'26032001',loc:'新竹市...',days:42,section:'介紹完考慮中-可能性高'},{id:'26032002',loc:'桃園市平鎮...',days:30,section:'機會高-需要時間等待'}]},
];

function loadState(){
  try{ const d=localStorage.getItem('alloc_v2'); return d?JSON.parse(d):JSON.parse(JSON.stringify(DEF)); }
  catch(e){ return JSON.parse(JSON.stringify(DEF)); }
}
const people = loadState();

function save(){
  localStorage.setItem('alloc_v2', JSON.stringify(people));
  const el=document.getElementById('si');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

function score(p){ return p.tracking + (p.overdue * 2); }

function scoreStyle(s){
  if(s<=25) return {bg:'var(--success-bg)',text:'var(--success-text)'};
  if(s<=50) return {bg:'var(--warning-bg)',text:'var(--warning-text)'};
  return {bg:'var(--danger-bg)',text:'var(--danger-text)'};
}

function personColor(p){
  const idx = people.indexOf(p);
  return COLORS[idx % COLORS.length];
}

/* ── Build boards ── */
function buildBoards(){
  const regions = [...new Set(people.map(p=>p.region))];
  const container = document.getElementById('boards');
  container.innerHTML = '';

  regions.forEach(region => {
    const rp = [...people.filter(p=>p.region===region)];
    rp.sort((a,b)=>a.thisMonth-b.thisMonth||score(a)-score(b));
    const minMonth = Math.min(...rp.map(p=>p.thisMonth));

    const block = document.createElement('div');
    block.className = 'rb';
    block.innerHTML = `
      <div class="rh">
        <div class="rt">${region}</div>
        <div class="rc">共 ${rp.length} 位業務</div>
        <div class="rl"></div>
      </div>
      <div class="cgrid" id="grid-${region.replace(/\s/g,'-')}"></div>`;
    container.appendChild(block);

    const grid = block.querySelector('.cgrid');
    rp.forEach(p => {
      const s = score(p);
      const ss = scoreStyle(s);
      const isPriority = p.thisMonth === minMonth;
      const color = personColor(p);

      const tags = [
        p.possibleHigh>0 ? `<span class="tag ph">可能性高 ${p.possibleHigh}</span>` : '',
        p.timeNeeded>0   ? `<span class="tag tm">需要時間 ${p.timeNeeded}</span>` : '',
        p.introNeeded>0  ? `<span class="tag in">待介紹 ${p.introNeeded}</span>` : '',
        p.possibleLow>0  ? `<span class="tag pl">可能性低 ${p.possibleLow}</span>` : '',
      ].filter(Boolean).join('');

      const odItems = (p.overdueList||[]).map(o=>`
        <div class="od-item">
          <div class="od-name">${o.id}/${o.loc}</div>
          <div class="od-days">${o.days}天</div>
          <div class="od-sec">${(o.section||'').replace('介紹完考慮中-','').replace('機會高-需要時間等待','需要時間').replace('待介紹','待介紹')}</div>
        </div>`).join('');

      const card = document.createElement('div');
      card.className = 'card' + (isPriority?' priority':'');
      card.innerHTML = `
        <div class="cbar" style="background:${color};"></div>
        ${isPriority?'<div class="pb"><i class="ti ti-trophy" aria-hidden="true" style="font-size:11px;"></i> 本區優先分配</div>':'<div style="height:4px;"></div>'}
        <div class="ctop">
          <div class="cname">${p.name}</div>
          <div class="score" style="background:${ss.bg};color:${ss.text};">${s}</div>
        </div>
        <div class="stats">
          <div class="st"><div class="sv" style="color:var(--info-text);">${p.thisMonth}</div><div class="sl">本月已分配</div></div>
          <div class="st"><div class="sv">${p.tracking}</div><div class="sl">追蹤中</div></div>
          <div class="st"><div class="sv" style="color:var(--danger-text);">▲${p.overdue}</div><div class="sl">逾期</div></div>
          <div class="st"><div class="sv" style="color:${ss.text};">${s}</div><div class="sl">分配分數</div></div>
        </div>
        <div class="tags">${tags}</div>
        ${odItems?`<div class="od-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i> 逾期案件（超過 14 天未更新）</div><div>${odItems}</div>`:''}
      `;
      grid.appendChild(card);
    });
  });

  document.getElementById('htime').textContent =
    new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) + ' 更新';
}

/* ── Edit panel ── */
function buildEditPanel(){
  document.getElementById('ep-grid').innerHTML = people.map((p,pi)=>`
    <div class="ep-card">
      <div class="ep-name">
        <span class="ep-dot" style="background:${personColor(p)};"></span>
        ${p.name} <span style="font-size:10px;color:var(--t3);margin-left:2px;">${p.region}</span>
      </div>
      <div class="ep-fields">
        ${[['本月已分配','thisMonth'],['追蹤中件數','tracking'],['逾期件數','overdue'],['待介紹','introNeeded'],['可能性高','possibleHigh'],['需要時間','timeNeeded'],['可能性低','possibleLow']].map(([lbl,key])=>`
          <div class="ep-f">
            <div class="ep-lbl">${lbl}</div>
            <input class="ep-inp" type="number" min="0" value="${p[key]||0}" oninput="upField(${pi},'${key}',this.value)">
          </div>`).join('')}
      </div>
    </div>
  `).join('');
}

function upField(pi,key,val){
  people[pi][key] = Math.max(0,parseInt(val)||0);
  save(); buildBoards();
}

let editOpen = false;
function toggleEdit(){
  editOpen = !editOpen;
  document.getElementById('ep').classList.toggle('open', editOpen);
  document.getElementById('btn-edit').classList.toggle('on', editOpen);
  if(editOpen) buildEditPanel();
}

function addPerson(){
  const name = document.getElementById('new-name').value.trim();
  const region = document.getElementById('new-region').value;
  if(!name) return;
  if(people.find(p=>p.name===name)){alert('此姓名已存在');return;}
  people.push({name,region,thisMonth:0,tracking:0,overdue:0,possibleHigh:0,timeNeeded:0,introNeeded:0,possibleLow:0,overdueList:[]});
  document.getElementById('new-name').value='';
  save(); buildBoards();
  if(editOpen) buildEditPanel();
}

function removePerson(){
  const name = prompt('輸入要刪除的業務姓名：');
  if(!name) return;
  const idx = people.findIndex(p=>p.name===name);
  if(idx===-1){alert('找不到此業務');return;}
  if(!confirm(`確定刪除「${name}」？`)) return;
  people.splice(idx,1);
  save(); buildBoards();
  if(editOpen) buildEditPanel();
}

/* ── 從 data.json 自動載入（GitHub Pages 模式）── */
async function syncFromDataJson(){
  try{
    const res = await fetch('./data.json?t='+Date.now());
    if(!res.ok) return;
    const data = await res.json();
    if(!data.alloc || data.alloc._error) return;

    Object.entries(data.alloc).forEach(([asanaName, info])=>{
      const p = people.find(x =>
        asanaName.includes(x.name.split('/')[0].trim()) ||
        x.name.includes(asanaName.split('/')[0].trim())
      );
      if(!p) return;
      p.tracking = info.tracking || 0;
      p.overdue  = info.overdue  || 0;
      const sc = info.statusCount || {};
      p.possibleHigh = sc['介紹完考慮中-可能性高'] || 0;
      p.possibleLow  = sc['介紹完考慮中-可能性低'] || 0;
      p.timeNeeded   = sc['機會高-需要時間等待']    || 0;
      p.introNeeded  = (sc['待介紹']||0) + (sc['待線上介紹']||0);
      p.overdueList  = info.overdueList || [];
    });

    save(); buildBoards();
    const t = new Date(data.syncTime);
    document.getElementById('htime').textContent =
      'Asana 同步：' + t.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}) +
      ' ' + t.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  } catch(e){}
}

buildBoards();
syncFromDataJson();
</script>
</body>
</html>
